name: EGPACK tools

on:
  push:
    paths:
      - "tools/egpack/**"
      - "tests/egpack/**"
      - "tests/__init__.py"
      - ".github/workflows/egpack-tools.yml"
  pull_request:
    paths:
      - "tools/egpack/**"
      - "tests/egpack/**"
      - "tests/__init__.py"
      - ".github/workflows/egpack-tools.yml"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Compile tools and tests
        run: python -m compileall -q tools tests
